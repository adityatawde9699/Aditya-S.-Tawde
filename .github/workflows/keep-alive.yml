name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          echo "Pinging backend at $(date)"
          curl --max-time 60 --retry 3 --retry-delay 10 \
            -f https://portfolio-backend-jblq.onrender.com/api/health/ \
            && echo "Backend is alive" \
            || echo "Ping failed (backend may be starting)"
