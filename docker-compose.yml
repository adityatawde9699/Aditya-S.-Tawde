services:
  backend:
    build: ./server
    ports: ["8000:8000"]
    env_file: ./server/.env
    volumes:
      - ./server:/app
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./client
      target: builder
    ports: ["5173:5173"]
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=http://localhost:8000/api
