services:
  - type: web
    name: portfolio-backend
    runtime: python
    region: singapore
    plan: free
    pythonVersion: "3.12.9"

    rootDir: server
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: >
      gunicorn portfolio_backend.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 2
      --access-logfile -
      --error-logfile -

    healthCheckPath: /api/health/

    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        sync: false          # Set manually in the Render dashboard
      - key: DATABASE_URL
        sync: false          # Set manually or link to a Render PostgreSQL DB
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: PROD_CLIENT_URL
        sync: false          # e.g. https://portfolio-frontend.onrender.com
