services:
  - type: web
    name: portfolio-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: "gunicorn portfolio_backend.wsgi:application --workers 2 --threads 2 --access-logfile - --error-logfile -"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: PROD_CLIENT_URL
        value: https://aditya-s-tawde.vercel.app/
