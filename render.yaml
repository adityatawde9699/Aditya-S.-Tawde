services:
  - type: web
    name: portfolio-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    # --include=dev forces devDependencies (typescript, tsx, drizzle-kit, @types/*)
    # to install even though NODE_ENV=production, since the build/migrate/seed
    # steps need them. Runtime (npm run start) uses only the compiled dist/.
    buildCommand: npm install --include=dev && npm run build && npm run db:migrate && npm run db:seed
    startCommand: npm run start
    healthCheckPath: /api/health/
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: PROD_CLIENT_URL
        value: https://aditya-s-tawde.vercel.app
